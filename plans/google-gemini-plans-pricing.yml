specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Google Gemini
providerId: google-gemini
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Generative AI
  - LLM
  - Google
  - AI Infrastructure
description: Gemini API is offered in three service tiers - Free (limited models, no charge), Paid (higher
  rate limits, context caching, Batch API at 50% off), and Enterprise (custom security, provisioned throughput,
  volume discounts). Per-model pricing is per-million tokens with separate input and output rates and
  multi-band pricing for very long prompts. Multimodal inputs (audio) are priced higher than text/image/video.
sources:
  - https://ai.google.dev/pricing
  - https://ai.google.dev/gemini-api/docs/pricing
  - https://ai.google.dev/gemini-api/docs/rate-limits
plans:
  - id: google-gemini-free
    name: Free Tier
    type: freemium
    description: Free access to a subset of Gemini models (e.g., Gemini 3.1 Flash-Lite Preview, 2.5 Flash)
      with input and output tokens at no charge. Subject to lower per-minute rate limits than paid tier.
    entries:
      - label: Free input/output tokens
        description: Tokens at no charge on free-tier-eligible models
        name: free_tokens
        type: quota
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://generativelanguage.googleapis.com
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Gemini 3.1 Flash-Lite Preview (free models)
      - name: Gemini 2.5 Flash (limited)
      - name: Lower rate limits
      - name: Best-effort availability
  - id: google-gemini-3-1-pro-preview
    name: Paid - Gemini 3.1 Pro Preview
    type: usage-based
    description: Per-token pricing for Gemini 3.1 Pro Preview with banded pricing for prompts above 200K
      tokens.
    entries:
      - label: Input tokens (<=200K)
        description: Per-million input tokens for prompts up to 200K tokens
        name: g31_pro_input_short
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://generativelanguage.googleapis.com
        unit: 1000000
        price: '2.00'
        userMultiplied: false
      - label: Input tokens (>200K)
        description: Per-million input tokens for prompts above 200K tokens
        name: g31_pro_input_long
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://generativelanguage.googleapis.com
        unit: 1000000
        price: '4.00'
        userMultiplied: false
      - label: Output tokens (<=200K prompt)
        description: Per-million output tokens for prompts up to 200K tokens
        name: g31_pro_output_short
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://generativelanguage.googleapis.com
        unit: 1000000
        price: '12.00'
        userMultiplied: false
      - label: Output tokens (>200K prompt)
        description: Per-million output tokens for prompts above 200K tokens
        name: g31_pro_output_long
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://generativelanguage.googleapis.com
        unit: 1000000
        price: '18.00'
        userMultiplied: false
    elements:
      - name: Gemini 3.1 Pro (Preview)
      - name: Long-context banded pricing
      - name: Context caching
      - name: Batch API (50% off)
  - id: google-gemini-3-1-flash-lite-preview
    name: Paid - Gemini 3.1 Flash-Lite Preview
    type: usage-based
    description: Per-token pricing for Gemini 3.1 Flash-Lite Preview. Audio inputs priced higher than
      text/image/video.
    entries:
      - label: Input tokens (text / image / video)
        description: Per-million input tokens for text, image, or video
        name: g31_fl_input_text
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://generativelanguage.googleapis.com
        unit: 1000000
        price: '0.25'
        userMultiplied: false
      - label: Input tokens (audio)
        description: Per-million input tokens for audio
        name: g31_fl_input_audio
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://generativelanguage.googleapis.com
        unit: 1000000
        price: '0.50'
        userMultiplied: false
      - label: Output tokens
        description: Per-million output tokens
        name: g31_fl_output
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://generativelanguage.googleapis.com
        unit: 1000000
        price: '1.50'
        userMultiplied: false
    elements:
      - name: Gemini 3.1 Flash-Lite (Preview)
      - name: Multimodal input (text/image/video/audio)
      - name: Batch API (50% off)
  - id: google-gemini-2-5-flash
    name: Paid - Gemini 2.5 Flash
    type: usage-based
    description: Per-token pricing for Gemini 2.5 Flash. Audio inputs priced higher than text/image/video.
    entries:
      - label: Input tokens (text / image / video)
        description: Per-million input tokens for text, image, or video
        name: g25_flash_input_text
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://generativelanguage.googleapis.com
        unit: 1000000
        price: '0.30'
        userMultiplied: false
      - label: Input tokens (audio)
        description: Per-million input tokens for audio
        name: g25_flash_input_audio
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://generativelanguage.googleapis.com
        unit: 1000000
        price: '1.00'
        userMultiplied: false
      - label: Output tokens
        description: Per-million output tokens
        name: g25_flash_output
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://generativelanguage.googleapis.com
        unit: 1000000
        price: '2.50'
        userMultiplied: false
    elements:
      - name: Gemini 2.5 Flash
      - name: Multimodal input
      - name: Batch API (50% off)
  - id: google-gemini-2-5-flash-lite
    name: Paid - Gemini 2.5 Flash-Lite
    type: usage-based
    description: Per-token pricing for Gemini 2.5 Flash-Lite. Lowest list price for cost-sensitive workloads.
    entries:
      - label: Input tokens (text / image / video)
        description: Per-million input tokens for text, image, or video
        name: g25_fl_input_text
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://generativelanguage.googleapis.com
        unit: 1000000
        price: '0.10'
        userMultiplied: false
      - label: Input tokens (audio)
        description: Per-million input tokens for audio
        name: g25_fl_input_audio
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://generativelanguage.googleapis.com
        unit: 1000000
        price: '0.30'
        userMultiplied: false
      - label: Output tokens
        description: Per-million output tokens
        name: g25_fl_output
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://generativelanguage.googleapis.com
        unit: 1000000
        price: '0.40'
        userMultiplied: false
    elements:
      - name: Gemini 2.5 Flash-Lite
      - name: Lowest cost tier
      - name: Batch API (50% off)
  - id: google-gemini-grounding-search
    name: Add-on - Google Search Grounding
    type: usage-based
    description: Per-search pricing for Google Search grounding requests. First 5,000 prompts/month are
      free (shared across Gemini 3 models).
    entries:
      - label: Free monthly prompts
        description: Free Google Search grounding prompts per month
        name: search_free
        type: quota
        metric: requests
        limit: 5000
        timeFrame: month
        geo: global
        domains:
          - https://generativelanguage.googleapis.com
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Search grounding overage
        description: Per-1,000 search queries above the free monthly allowance
        name: search_overage
        type: metered
        metric: requests
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://generativelanguage.googleapis.com
        unit: 1000
        price: '14.00'
        userMultiplied: false
    elements:
      - name: Google Search grounding for Gemini 3
      - name: Free 5K prompts/month shared across Gemini 3
  - id: google-gemini-enterprise
    name: Enterprise (Vertex AI)
    type: enterprise
    description: Enterprise SKU sold via Google Cloud / Vertex AI with provisioned throughput, custom
      security, VPC-SC, customer-managed encryption keys, and volume discount commitments. Pricing custom.
    entries:
      - label: Provisioned throughput
        description: Reserved Gemini capacity at negotiated rate
        name: provisioned_throughput
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://aiplatform.googleapis.com
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Provisioned throughput
      - name: VPC-SC + CMEK + data residency controls
      - name: Volume / commit discounts
      - name: Vertex AI integration
maintainers:
