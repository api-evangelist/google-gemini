# ─────────────────────────────────────────────
# Query Root
# ─────────────────────────────────────────────

type Query {
  """List all available Gemini models."""
  listModels(pageSize: Int, pageToken: String): ModelConnection!

  """Get a specific model by name."""
  getModel(name: String!): Model!

  """List all tuned models accessible to the user."""
  listTunedModels(pageSize: Int, pageToken: String, filter: String): TunedModelConnection!

  """Get a specific tuned model."""
  getTunedModel(name: String!): TunedModel!

  """List all cached content objects."""
  listCachedContents(pageSize: Int, pageToken: String): CachedContentConnection!

  """Get a specific cached content object."""
  getCachedContent(name: String!): CachedContent!

  """List all files uploaded via the Files API."""
  listFiles(pageSize: Int, pageToken: String): FileConnection!

  """Get a specific file by name."""
  getFile(name: String!): File!

  """List all corpora accessible to the user."""
  listCorpora(pageSize: Int, pageToken: String): CorpusConnection!

  """Get a specific corpus."""
  getCorpus(name: String!): Corpus!

  """List all documents in a corpus."""
  listDocuments(corpusName: String!, pageSize: Int, pageToken: String, filter: String): DocumentConnection!

  """Get a specific document."""
  getDocument(name: String!): Document!

  """List all chunks in a document."""
  listChunks(documentName: String!, pageSize: Int, pageToken: String): ChunkConnection!

  """Get a specific chunk."""
  getChunk(name: String!): Chunk!

  """List permissions for a resource."""
  listPermissions(parent: String!, pageSize: Int, pageToken: String): [Permission!]!

  """Get a specific permission."""
  getPermission(name: String!): Permission!

  """Get the status of a long-running operation."""
  getOperation(name: String!): Operation!

  """Count the number of tokens in content."""
  countTokens(input: CountTokensInput!): CountTokensResponse!

  """Query a corpus for relevant chunks."""
  queryCorpus(name: String!, query: String!, metadataFilters: [JSON!], resultsCount: Int): [RelevantChunk!]!

  """Query a document for relevant chunks."""
  queryDocument(name: String!, query: String!, metadataFilters: [JSON!], resultsCount: Int): [RelevantChunk!]!
}

"""A chunk returned from a semantic retrieval query with a relevance score."""
type RelevantChunk {
  chunkRelevanceScore: Float!
  chunk: Chunk!
}

# ─────────────────────────────────────────────
# Mutation Root
# ─────────────────────────────────────────────

type Mutation {
  """Generate content (non-streaming) from a Gemini model."""
  generateContent(input: GenerateContentInput!): GenerateContentResponse!

  """Generate text embeddings for a single piece of content."""
  embedContent(input: EmbedContentInput!): EmbedContentResponse!

  """Generate text embeddings for a batch of content items."""
  batchEmbedContents(input: BatchEmbedContentsInput!): BatchEmbedContentsResponse!

  """Upload a file for use in multimodal requests."""
  uploadFile(displayName: String, mimeType: String!, file: Upload!): File!

  """Delete a file from the Files API."""
  deleteFile(name: String!): Boolean!

  """Create a new cached content resource."""
  createCachedContent(input: CreateCachedContentInput!): CachedContent!

  """Update the expiry of cached content."""
  updateCachedContent(input: UpdateCachedContentInput!): CachedContent!

  """Delete cached content."""
  deleteCachedContent(name: String!): Boolean!

  """Create a new fine-tuned model."""
  createTunedModel(input: CreateTunedModelInput!): Operation!

  """Update an existing tuned model's metadata."""
  updateTunedModel(input: UpdateTunedModelInput!): TunedModel!

  """Delete a tuned model."""
  deleteTunedModel(name: String!): Boolean!

  """Transfer ownership of a tuned model."""
  transferOwnership(name: String!, emailAddress: String!): Boolean!

  """Create a new semantic retrieval corpus."""
  createCorpus(input: CreateCorpusInput!): Corpus!

  """Delete a corpus and all its documents and chunks."""
  deleteCorpus(name: String!, force: Boolean): Boolean!

  """Create a document in a corpus."""
  createDocument(input: CreateDocumentInput!): Document!

  """Delete a document and all its chunks."""
  deleteDocument(name: String!, force: Boolean): Boolean!

  """Create a chunk in a document."""
  createChunk(input: CreateChunkInput!): Chunk!

  """Batch create chunks in a document."""
  batchCreateChunks(documentName: String!, requests: [CreateChunkInput!]!): [Chunk!]!

  """Delete a chunk."""
  deleteChunk(name: String!): Boolean!

  """Batch delete chunks."""
  batchDeleteChunks(documentName: String!, names: [String!]!): Boolean!

  """Create a permission on a resource."""
  createPermission(input: CreatePermissionInput!): Permission!

  """Delete a permission."""
  deletePermission(name: String!): Boolean!

  """Cancel a long-running operation."""
  cancelOperation(name: String!): Boolean!
}

# ─────────────────────────────────────────────
# Subscription Root
# ─────────────────────────────────────────────

type Subscription {
  """Stream generated content tokens as they are produced."""
  streamGenerateContent(input: GenerateContentInput!): GenerateContentResponse!

  """Receive real-time updates on a tuning job."""
  tunedModelProgress(name: String!): TuningJobProgress!

  """Receive real-time updates on a file being processed."""
  fileProcessingStatus(name: String!): FileProcessingUpdate!

  """Receive live multimodal streaming session updates."""
  liveSession(sessionId: String!): LiveSessionMessage!
}

"""Progress update for an in-progress tuning job."""
type TuningJobProgress {
  state: TuningJobState!
  completedSteps: Int
  totalSteps: Int
  snapshots: [TuningSnapshot!]
}

"""Update about a file being processed by the Files API."""
type FileProcessingUpdate {
  name: String!
  state: FileState!
  error: Status
}

"""A message from a Gemini Live streaming session."""
type LiveSessionMessage {
  sessionId: String!
  serverContent: LiveServerContent
  toolCall: LiveToolCall
  toolCallCancellation: LiveToolCallCancellation
  setupComplete: Boolean
}

"""Content delivered from the server in a live session."""
type LiveServerContent {
  modelTurn: Content
  turnComplete: Boolean
  interrupted: Boolean
  groundingMetadata: GroundingMetadata
}

"""A tool call request within a live session."""
type LiveToolCall {
  functionCalls: [FunctionCall!]!
}

"""Cancellation of a tool call in a live session."""
type LiveToolCallCancellation {
  ids: [String!]!
}
